<section class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex flex-col gap-5">
    
    <!-- Top Row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      <!-- Left Banner (Static) -->
      <a [href]="leftBanner.link" class="relative rounded-2xl overflow-hidden group h-[250px] md:h-[400px] block cursor-pointer">
        <img [src]="leftBanner.imageSrc" [alt]="leftBanner.title" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-6 md:p-8">
          <span class="bg-soft-pink-50 text-maroon-700 text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-full w-fit mb-3">{{ leftBanner.badge | translate }}</span>
          <h3 class="text-white text-xl md:text-2xl lg:text-3xl leading-snug font-bold mb-6 max-w-[200px] drop-shadow-md">{{ leftBanner.title | translate }}</h3>
          <button class="bg-soft-pink-50 text-maroon-700 hover:bg-white font-bold py-2.5 px-6 rounded-xl w-fit transition-colors flex items-center justify-center gap-3 text-sm z-10 pointer-events-none shadow-lg">
            {{ leftBanner.ctaText | translate }} <i class="pi pi-arrow-right text-sm"></i>
          </button>
        </div>
      </a>

      <!-- Main Banner Carousel (Col Span 2) -->
      <div class="relative md:col-span-2 rounded-2xl overflow-hidden group h-[300px] md:h-[400px] block">
        <!-- PrimeNG Carousel looping over dynamically mapped API products -->
        <p-carousel [value]="mainBanners" [numVisible]="1" [numScroll]="1" [circular]="true" [autoplayInterval]="5000" [showNavigators]="false" 
          indicatorStyleClass="absolute top-6 right-6 flex gap-2 w-auto z-20 m-0 p-0" 
          [showIndicators]="false" class="h-full w-full">
          <ng-template let-banner pTemplate="item">
            <a [href]="banner.link" class="relative w-full h-full block cursor-pointer group/slide">
              <img [src]="banner.imageSrc" [alt]="banner.title" class="w-full h-full object-cover transition-transform duration-700 group-hover/slide:scale-105">
              
              <div class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/40 to-transparent flex flex-col justify-center p-8 md:p-12">
                <h2 class="text-white text-3xl md:text-[42px] font-bold mb-3 md:mb-4 tracking-tight">{{ banner.title | translate }}</h2>
                <p class="text-white text-sm md:text-base mb-6 md:mb-8 font-light max-w-sm">{{ banner.subtitle | translate }}</p>
                <button class="bg-soft-pink-50 text-maroon-700 hover:bg-white font-semibold py-2.5 px-8 rounded-full w-fit transition-colors text-sm md:text-base shadow-sm z-10 pointer-events-none">
                  {{ banner.ctaText | translate }}
                </button>
              </div>
            </a>
          </ng-template>
        </p-carousel>
      </div>
    </div>

    <!-- Bottom Row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
      @for (banner of bottomBanners; track $index) {
        <app-bottom-banner [banner]="banner"></app-bottom-banner>
      }
    </div>

  </div>
</section>
