<div class="max-w-7xl mx-auto px-4">
  <div
    class="bg-maroon-50 dark:bg-[#3D3B40] rounded-2xl py-6 px-6 md:px-10 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm border border-transparent transition-colors duration-300"
  >
    @for (feature of features; track feature.title) {
    <div class="flex items-center gap-4 w-full md:w-auto justify-start group">
      <div
        class="w-12 h-12 md:w-[50px] md:h-[50px] rounded-full flex items-center justify-center shrink-0 bg-maroon-700 dark:bg-[#F9C5D1] text-white dark:text-[#3D3B40] transition-colors duration-300 shadow-sm"
      >
        <i [class]="feature.icon" class="text-xl md:text-2xl font-normal"></i>
      </div>
      <div class="flex flex-col">
        <h4
          class="text-maroon-700 dark:text-[#F9C5D1] font-semibold text-sm md:text-base leading-tight transition-colors duration-300"
        >
          {{ feature.title | translate }}
        </h4>
        <p
          class="text-zinc-500 dark:text-zinc-300 text-xs md:text-[13px] mt-0.5 font-normal transition-colors duration-300"
        >
          {{ feature.subtitle | translate }}
        </p>
      </div>
    </div>
    }
  </div>
</div>
