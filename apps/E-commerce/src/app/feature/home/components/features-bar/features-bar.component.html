<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="mt-4 bg-[#3D3B40] rounded-2xl py-6 px-6 md:px-10 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm border border-transparent">
    @for (feature of features; track feature.title) {
      <div class="flex items-center gap-4 w-full md:w-auto justify-start">
        <div class="w-12 h-12 md:w-[50px] md:h-[50px] rounded-full flex items-center justify-center shrink-0 bg-[#F9C5D1] text-[#3D3B40] transition-colors duration-300 shadow-sm">
          <i [class]="feature.icon" class="text-xl md:text-2xl font-normal"></i>
        </div>
        <div class="flex flex-col">
          <h4 class="text-[#F9C5D1] font-semibold text-sm md:text-base leading-tight">{{ feature.title }}</h4>
          <p class="text-zinc-300 text-xs md:text-[13px] mt-0.5 font-normal">{{ feature.subtitle }}</p>
        </div>
      </div>
    }
  </div>
</div>
