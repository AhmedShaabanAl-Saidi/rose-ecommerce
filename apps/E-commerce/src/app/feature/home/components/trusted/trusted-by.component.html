<section class="lg:p-20">
  <div class="bg-maroon-50 dark:bg-zinc-700 py-5 lg:py-10 lg:rounded-2xl">
    <h2
      class="text-center text-maroon-700 font-bold text-2xl lg:text-4xl dark:text-soft-pink-200"
    >
      {{ 'TRUSTED.TRUSTED_PART1' | translate }}
      <span class="text-soft-pink-500 dark:text-maroon-400">{{
        'TRUSTED.TRUSTED_COUNT' | translate
      }}</span>
      {{ 'TRUSTED.TRUSTED_PART2' | translate }}
    </h2>
    <div
      class="flex flex-wrap items-center justify-center gap-10 pt-5 lg:pt-10"
    >
      @for (image of images(); track $index) {
      <img
        class="opacity-100 hover:opacity-70 md:animate-bounce transition-all duration-300 hover:scale-110"
        [src]="image"
        [alt]="`Trusted ${$index}` "
      />
      }
    </div>
  </div>
</section>
