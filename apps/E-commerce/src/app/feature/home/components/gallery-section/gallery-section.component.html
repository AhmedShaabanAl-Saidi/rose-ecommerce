<section class="max-w-7xl mx-auto px-4 py-12 md:py-16">
  <!-- Header -->
  <div class="text-center mb-10 md:mb-14">
    <p class="text-soft-pink-500 uppercase tracking-[0.2em] text-xs font-bold mb-3">{{ 'GALLERY.GALLERY_LABEL' | translate }}</p>
    <h2 class="text-3xl md:text-4xl font-bold text-maroon-700 dark:text-soft-pink-200 transition-colors duration-300">
      <span class="relative inline-block">
        {{ 'GALLERY.CHECK_OUT' | translate }}
        <span class="absolute bottom-1 left-0 w-full h-3 bg-soft-pink-200 dark:bg-soft-pink-800 -z-10 opacity-70"></span>
      </span> 
      {{ 'GALLERY.OUR_WONDERFUL_GALLERY' | translate }}
    </h2>
  </div>

  <!-- Masonry Grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 h-[800px] md:h-[600px] lg:h-[700px]">
    
    <!-- Column 1 -->
    <div class="flex flex-col gap-4 md:gap-6 h-full">
      <div class="w-full h-[60%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery1.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.GIFTS_ANNIVERSARY' | translate" />
      </div>
      <div class="w-full h-[40%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery4.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.CHOCOLATES' | translate" />
      </div>
    </div>
    
    <!-- Column 2 -->
    <div class="flex flex-col gap-4 md:gap-6 h-full">
      <div class="w-full h-[40%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery2.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.RED_GIFTS' | translate" />
      </div>
      <div class="w-full h-[60%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery5.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.RING_BOX_FLOWERS' | translate" />
      </div>
    </div>
    
    <!-- Column 3 -->
    <div class="flex flex-col gap-4 md:gap-6 h-full">
      <div class="w-full h-[40%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery3.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.RING_BOX_WHITE' | translate" />
      </div>
      <div class="w-full h-[60%] overflow-hidden rounded-xl shadow-sm">
        <img src="images/gallery-section/gallery6.webp" 
             class="w-full h-full object-cover hover:scale-[1.03] transition-transform duration-500" 
             [alt]="'GALLERY.IMG_ALT.ENGAGEMENT_CARD' | translate" />
      </div>
    </div>
    
  </div>
</section>
