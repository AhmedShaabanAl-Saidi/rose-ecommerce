<section class="py-16">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">
        <div class="flex items-center gap-4 justify-center lg:justify-start">
            <div class="relative w-2/3 lg:w-3/5">
                <img src="images/about-section/about1.webp" [alt]="'ABOUT_SECTION.LABEL' | translate"
                    class="w-full h-auto object-cover">
            </div>
            <div class="flex flex-col gap-4 w-1/3 lg:w-2/5 mt-12">
                <img src="images/about-section/about2.webp" alt="Premium Packaging"
                    class="w-full h-auto object-cover">
                <img src="images/about-section/about3.webp" alt="Celebration Gift"
                    class="w-full h-auto object-cover">
            </div>
        </div>

        <div class="text-start">
            <span
                class="text-soft-pink-500 dark:text-maroon-400 font-bold tracking-widest text-[20px] mb-3 block uppercase">
                {{ 'ABOUT_SECTION.LABEL' | translate }}
            </span>

            <h2 class="text-maroon-700 dark:text-maroon-400 text-3xl md:text-4xl font-bold mb-2 leading-tight"
                [innerHTML]="'ABOUT_SECTION.TITLE' | translate">
            </h2>

            <p class="text-zinc-500 dark:text-zinc-400 text-sm mb-8 leading-relaxed max-w-xl">
                {{ 'ABOUT_SECTION.DESCRIPTION' | translate }}
            </p>

            <div class="mb-10">
                <lib-button routerLink="/products" variant="primary" size="md" [icon]="arrowIcon()" iconPos="right">
                    {{ 'ABOUT_SECTION.DISCOVER' | translate }}
                </lib-button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-4 gap-x-8">
                @for (feature of features; track $index) {
                <div class="about-feature-item group">
                    <div class="about-feature-icon-box">
                        <i class="pi pi-check about-feature-icon"></i>
                    </div>
                    <span class="about-feature-text">{{ feature | translate }}</span>
                </div>
                }
            </div>
        </div>
    </div>
</section>
