<section class="bg-gray-100 py-8">
  <div class="container mx-auto px-4">

    <div class="flex gap-8">

      <!-- Sidebar -->
      <div class="w-[280px] hidden lg:block">
        <app-products-sidebar></app-products-sidebar>
      </div>

      <!-- Products Area -->
      <div class="flex-1">

        <!-- Grid -->
        <div class="grid sm:grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">

          @for (product of allProducts; track product._id) {
          <app-product-card [product]="product"></app-product-card>
          }

        </div>

        <!-- Paginator -->
        <div class="flex justify-center mt-10">
          <p-paginator (onPageChange)="onPageChange($event)" [first]="first" [rows]="rows"
            [totalRecords]="totalProducts" [rowsPerPageOptions]="[4, 8, 12, 16]">
          </p-paginator>
        </div>

      </div>

    </div>

  </div>
</section>
