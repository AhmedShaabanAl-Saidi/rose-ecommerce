<div class="bg-white rounded-2xl p-6 border border-gray-200 space-y-6">

  <!-- Category -->
  <div>
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-gray-800">Category</h3>
      <button class="text-sm text-red-500">Reset</button>
    </div>

    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
        <input type="checkbox" class="accent-red-500">
        Cards
      </label>

      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
        <input type="checkbox" class="accent-red-500">
        Chocolate
      </label>

      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
        <input type="checkbox" class="accent-red-500">
        Flowers
      </label>

      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
        <input type="checkbox" class="accent-red-500">
        Gifts
      </label>
    </div>
  </div>

  <!-- Occasion -->
  <div>
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-gray-800">Occasion</h3>
      <button class="text-sm text-red-500">Reset</button>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="bg-gray-100 rounded-xl p-3 text-center text-sm cursor-pointer hover:bg-red-50">
        Wedding
      </div>
      <div class="bg-gray-100 rounded-xl p-3 text-center text-sm cursor-pointer hover:bg-red-50">
        Graduation
      </div>
      <div class="bg-gray-100 rounded-xl p-3 text-center text-sm cursor-pointer hover:bg-red-50">
        Father’s Day
      </div>
      <div class="bg-gray-100 rounded-xl p-3 text-center text-sm cursor-pointer hover:bg-red-50">
        Birthday
      </div>
    </div>
  </div>

  <!-- Rating -->
  <div>
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-gray-800">Rating</h3>
      <button class="text-sm text-red-500">Reset</button>
    </div>

    <div class="space-y-2 text-yellow-400">
      <div class="cursor-pointer">★★★★★</div>
      <div class="cursor-pointer">★★★★☆</div>
      <div class="cursor-pointer">★★★☆☆</div>
      <div class="cursor-pointer">★★☆☆☆</div>
    </div>
  </div>

  <!-- Price -->
  <div>
    <div class="flex justify-between items-center mb-3">
      <h3 class="font-semibold text-gray-800">Price</h3>
      <button class="text-sm text-red-500">Reset</button>
    </div>

    <div class="flex gap-3">
      <input type="number"
             placeholder="from"
             class="w-full border border-gray-200 rounded-xl p-2 text-sm">
      <input type="number"
             placeholder="to"
             class="w-full border border-gray-200 rounded-xl p-2 text-sm">
    </div>
  </div>

  <!-- Reset All -->
  <button class="w-full bg-red-500 text-white py-2 rounded-xl hover:bg-red-600 transition">
    Reset All
  </button>

</div>
