<div class="flex flex-col gap-6 w-full">
  <div
    class="rounded-2xl overflow-hidden h-100 w-full flex justify-center items-center shadow"
  >
    <img
      [src]="mainImage()"
      class="max-w-full max-h-full object-contain p-4 transition-all duration-500"
      [alt]="product()?.title"
    />
  </div>

  <div
    class="flex gap-3 justify-center items-center pb-2 overflow-x-auto custom-scrollbar"
  >
    <button
      type="button"
      (click)="changeImage(product()?.imgCover!)"
      class="w-20 h-20 shrink-0 rounded-lg border-2 p-0 overflow-hidden cursor-pointer transition-all"
      [class.border-maroon-400]="mainImage() === product()?.imgCover"
      [class.border-transparent]="mainImage() !== product()?.imgCover"
    >
      <img
        [src]="product()?.imgCover"
        class="w-full h-full object-cover"
        alt="cover"
      />
    </button>

    @for (img of product()?.images; track img) {
    <button
      type="button"
      (click)="changeImage(img)"
      class="w-20 h-20 shrink-0 rounded-lg border-2 p-0 overflow-hidden cursor-pointer transition-transform hover:scale-105"
      [class.border-maroon-400]="mainImage() === img"
      [class.border-transparent]="mainImage() !== img"
    >
      <img [src]="img" class="w-full h-full object-cover" [alt]="img" />
    </button>
    }
  </div>
</div>
