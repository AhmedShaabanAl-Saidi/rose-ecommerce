<div class="space-y-6">
  <form [formGroup]="authForm" (ngSubmit)="submit()" class="space-y-5">
    <!-- First / Last Name -->
    <div class="grid grid-cols-2 gap-4">
      <lib-text-input
        label="First name"
        placeholder="First name"
        formControlName="firstName"
      ></lib-text-input>

      <lib-text-input
        label="Last name"
        placeholder="Last name"
        formControlName="lastName"
      ></lib-text-input>
    </div>

    <!-- Email -->
    <lib-text-input
      label="Email"
      placeholder="Email"
      type="email"
      formControlName="email"
    ></lib-text-input>

    <!-- Phone -->
    <lib-phone-input label="Phone" formControlName="phone"></lib-phone-input>

    <!-- Gender -->
    <div class="relative">
      <lib-select-input
        label="Gender"
        formControlName="gender"
        [options]="[
          { label: 'Male', value: 'male' },
          { label: 'Female', value: 'female' }
        ]"
      ></lib-select-input>
    </div>

    <!-- Password -->
    <lib-text-input
      label="Password"
      type="password"
      placeholder="Password"
      formControlName="password"
    ></lib-text-input>

    <!-- Confirm Password -->
    <lib-text-input
      label="Confirm Password"
      placeholder="Confirm Password"
      type="password"
      formControlName="rePassword"
    ></lib-text-input>
    
    @if (authForm.errors?.['mismatch']&&
    authForm.get('rePassword')?.touched) {
      <lib-input-error [control]="authForm" />}

    <!-- Submit -->

    <div class="mt-4">
      <ui-button
        class="mt-3"
        type="submit"
        [block]="true"
        [disabled]="authForm.invalid"
        class="w-full block"
      >
        Create Account
      </ui-button>
    </div>
  </form>
</div>
