<button
  [type]="type()"
  [disabled]="disabled() || loading()"
  [class]="classes()"
  (click)="onClick($event)"
>
  @if (loading()) {
    <ng-container>
      <lucide-icon 
        [img]="Loader2" 
        class="animate-spin -ml-1 mr-3 h-5 w-5 text-current"
        aria-hidden="true"
      ></lucide-icon>
      Loading...
    </ng-container>
  } @else {
    <ng-content></ng-content>
  }
</button>
