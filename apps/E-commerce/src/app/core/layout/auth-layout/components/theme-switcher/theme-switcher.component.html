<button
  (click)="themeService.toggleTheme()"
  class="text-zinc-700 cursor-pointer hover:text-maroon-400 dark:text-zinc-50 dark:hover:text-soft-pink-400 focus:outline-none transition-colors duration-200"
  [title]="'Change Theme'"
>
  @if (themeService.theme() === Theme.LIGHT) {
  <lucide-icon [img]="Moon" class="w-6 h-6"></lucide-icon>
  } @else {
  <lucide-icon [img]="Sun" class="w-6 h-6"></lucide-icon>
  }
</button>
