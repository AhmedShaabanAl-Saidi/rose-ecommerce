<button (click)="themeService.toggleTheme()"
    class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 focus:outline-none transition-colors duration-200"
    [title]="'Change Theme'">
    @if (themeService.theme() === Theme.LIGHT) {
    <lucide-icon [img]="Moon" class="w-6 h-6"></lucide-icon>
    } @else {
    <lucide-icon [img]="Sun" class="w-6 h-6"></lucide-icon>
    }
</button>
