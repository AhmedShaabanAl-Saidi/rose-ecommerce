<div class="w-full flex flex-col gap-3 items-center">
  <div [dir]="'ltr'" [class.invalid-otp]="Invalid">
    <ng-otp-input
      (onInputChange)="onOtpChange($event)"
      [config]="config"
    ></ng-otp-input>
  </div>

  @if (Invalid) {
  <div class="flex items-center gap-1 text-red-500 justify-center">
    <i-lucide name="alert-circle" size="14"></i-lucide>
    <span class="text-xs font-medium">{{ errorMessage }}</span>
  </div>
  }
</div>
