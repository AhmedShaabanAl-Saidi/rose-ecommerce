<div class="input-wrapper">
  @if (label()) {
  <label [for]="label()" class="input-label">
    {{ label() }}
  </label>
  }

  <div class="relative w-full flex items-center">
    @if (icon()) {
    <div class="input-icon-container left-3 pointer-events-none">
      <i-lucide [name]="icon()" size="18"></i-lucide>
    </div>
    }

    <input
      [id]="label()"
      [type]="
        type() === 'password' ? (showPassword() ? 'text' : 'password') : type()
      "
      [placeholder]="placeholder()"
      [value]="value || ''"
      [disabled]="isDisabled"
      (blur)="onTouched()"
      (input)="onChange($any($event.target).value)"
      class="input-base"
      [class.input-status-normal]="!Invalid"
      [class.input-status-error]="Invalid"
      [class.pl-10]="icon()"
      [class.pr-10]="type() === 'password'"
    />

    @if (type() === 'password') {
    <button
      type="button"
      (click)="togglePassword()"
      class="input-icon-container right-3 cursor-pointer hover:text-zinc-600 dark:hover:text-zinc-200 focus:outline-none"
    >
      <i-lucide
        [name]="showPassword() ? 'eye' : 'eye-off'"
        size="18"
      ></i-lucide>
    </button>
    }
  </div>

  <lib-input-error [control]="control" [customType]="type()"></lib-input-error>
</div>
